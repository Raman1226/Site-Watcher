<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Watcher — Get notified when your site is back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --border-light: #2a2a3e;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.15);
      --green: #22c55e;
      --green-glow: rgba(34,197,94,0.12);
      --red: #ef4444;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-glow);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Form ── */
    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="url"],
    input[type="email"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder { color: var(--muted); }

    /* ── Radio groups ── */
    .radio-group {
      display: flex;
      gap: 8px;
    }

    .radio-group label {
      flex: 1;
      text-transform: none;
      letter-spacing: 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin: 0;
    }

    .radio-option {
      position: relative;
      flex: 1;
    }

    .radio-option input {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }

    .radio-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      gap: 4px;
    }

    .radio-option input:checked + label {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: #a5b4fc;
    }

    .radio-option label:hover { border-color: var(--border-light); color: var(--text); }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* ── Submit button ── */
    .btn-start {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-start:hover { opacity: 0.9; }
    .btn-start:active { transform: scale(0.99); }
    .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
    }

    /* ── Status panel ── */
    #status-panel {
      display: none;
      margin-top: 24px;
    }

    .status-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .dot.running { animation: pulse 1.5s infinite; }

    .btn-stop {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s;
    }

    .btn-stop:hover { border-color: var(--red); color: var(--red); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    .stat-value.green { color: var(--green); }

    /* ── Success banner ── */
    .success-banner {
      display: none;
      background: var(--green-glow);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      margin-top: 16px;
    }

    .success-banner .icon { font-size: 28px; margin-bottom: 6px; }
    .success-banner h3 { color: var(--green); font-size: 15px; margin-bottom: 4px; }
    .success-banner p { color: var(--muted); font-size: 13px; }

    /* ── URL display ── */
    .monitoring-url {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 14px;
      word-break: break-all;
    }

    /* ── Footer ── */
    footer {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }

    footer a { color: var(--accent); text-decoration: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge"><span class="badge-dot"></span> HTTP Monitor</div>
    <h1>Site<span>Watcher</span></h1>
    <p class="subtitle">Paste a down website, get emailed the moment it comes back online.</p>
  </header>

  <div class="card">

    <!-- ── Form ── -->
    <div id="form-view">
      <div class="field">
        <label>Website URL</label>
        <input type="url" id="url" placeholder="https://example.com" autocomplete="off" />
      </div>

      <div class="field">
        <label>Your Gmail</label>
        <input type="email" id="email" placeholder="you@gmail.com" />
      </div>

      <hr class="divider" />

      <div class="field">
        <label>Ping every</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" name="interval" id="i20" value="20" />
            <label for="i20">20s</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="interval" id="i30" value="30" checked />
            <label for="i30">30s</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="interval" id="i60" value="60" />
            <label for="i60">60s</label>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Auto-stop after</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" name="duration" id="d30" value="30" />
            <label for="d30">30 min</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="duration" id="d60" value="60" checked />
            <label for="d60">1 hour</label>
          </div>
          <div class="radio-option">
            <input type="radio" name="duration" id="d120" value="120" />
            <label for="d120">2 hours</label>
          </div>
        </div>
      </div>

      <div id="error-msg" class="error-msg"></div>

      <button class="btn-start" id="btn-start" onclick="startMonitoring()">
        <span>Start Monitoring</span> <span>🚀</span>
      </button>
    </div>

    <!-- ── Status Panel ── -->
    <div id="status-panel">
      <div class="status-header">
        <div class="status-indicator">
          <div class="dot running" id="status-dot"></div>
          <span id="status-text">Monitoring…</span>
        </div>
        <button class="btn-stop" onclick="stopMonitoring()">Stop</button>
      </div>

      <div class="monitoring-url" id="monitoring-url"></div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Pings sent</div>
          <div class="stat-value" id="stat-pings">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Time left</div>
          <div class="stat-value" id="stat-time">—</div>
        </div>
      </div>

      <div class="success-banner" id="success-banner">
        <div class="icon">🟢</div>
        <h3>Site is back online!</h3>
        <p>Email sent to <span id="notified-email"></span></p>
        <p style="margin-top:8px; font-size:12px;">Monitoring stopped automatically.</p>
      </div>
    </div>

  </div>

  <footer>
    Built with Node.js + Express + Nodemailer &nbsp;·&nbsp;
    <a href="https://github.com" id="gh-link" target="_blank">View on GitHub</a>
  </footer>

<script>
  let sessionId = null;
  let pollInterval = null;

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }

  function formatTime(seconds) {
    if (seconds <= 0) return '0:00';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  async function startMonitoring() {
    hideError();

    const url      = document.getElementById('url').value.trim();
    const email    = document.getElementById('email').value.trim();
    const interval = document.querySelector('input[name="interval"]:checked')?.value;
    const duration = document.querySelector('input[name="duration"]:checked')?.value;

    if (!url)      return showError('Please enter a website URL.');
    if (!email)    return showError('Please enter your Gmail address.');
    if (!interval) return showError('Please select a ping interval.');
    if (!duration) return showError('Please select a max duration.');

    const btn = document.getElementById('btn-start');
    btn.disabled = true;
    btn.innerHTML = '<span>Starting…</span>';

    try {
      const res = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, email, interval, duration }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to start.');

      sessionId = data.sessionId;
      showStatusPanel(url, email);
      startPolling();

    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.innerHTML = '<span>Start Monitoring</span> <span>🚀</span>';
    }
  }

  function showStatusPanel(url, email) {
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('status-panel').style.display = 'block';
    document.getElementById('monitoring-url').textContent = url;
    document.getElementById('notified-email').textContent = email;
  }

  function startPolling() {
    pollInterval = setInterval(pollStatus, 3000);
    pollStatus(); // immediate first poll
  }

  async function pollStatus() {
    if (!sessionId) return;
    try {
      const res  = await fetch(`/api/status/${sessionId}`);
      const data = await res.json();

      document.getElementById('stat-pings').textContent = data.checkCount;
      document.getElementById('stat-time').textContent  = formatTime(data.remainingSeconds);

      if (data.status === 'success') {
        onSuccess();
      } else if (data.status === 'expired') {
        onExpired();
      } else if (data.status === 'stopped') {
        onStopped();
      }

    } catch (err) {
      console.error('Poll error:', err);
    }
  }

  function onSuccess() {
    clearInterval(pollInterval);
    document.getElementById('status-dot').classList.remove('running');
    document.getElementById('status-dot').style.background = 'var(--green)';
    document.getElementById('status-text').textContent = 'Site is back! ✅';
    document.getElementById('success-banner').style.display = 'block';
    document.querySelector('.btn-stop').style.display = 'none';
  }

  function onExpired() {
    clearInterval(pollInterval);
    document.getElementById('status-dot').classList.remove('running');
    document.getElementById('status-dot').style.background = 'var(--muted)';
    document.getElementById('status-text').textContent = 'Time limit reached';
    document.getElementById('stat-time').textContent = '0:00';
    document.querySelector('.btn-stop').textContent = 'Start Over';
    document.querySelector('.btn-stop').onclick = resetForm;
  }

  function onStopped() {
    clearInterval(pollInterval);
    document.getElementById('status-dot').classList.remove('running');
    document.getElementById('status-dot').style.background = 'var(--muted)';
    document.getElementById('status-text').textContent = 'Stopped';
  }

  async function stopMonitoring() {
    if (!sessionId) return;
    await fetch(`/api/stop/${sessionId}`, { method: 'POST' });
    onStopped();
    setTimeout(resetForm, 800);
  }

  function resetForm() {
    clearInterval(pollInterval);
    sessionId = null;
    document.getElementById('status-panel').style.display = 'none';
    document.getElementById('success-banner').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-start').innerHTML = '<span>Start Monitoring</span> <span>🚀</span>';
    document.querySelector('.btn-stop').style.display = '';
    document.querySelector('.btn-stop').textContent = 'Stop';
    document.querySelector('.btn-stop').onclick = stopMonitoring;
  }
</script>
</body>
</html>
